<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Akun Anda</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Selamat Datang</h1>
            <p>Silakan masuk menggunakan akun Anda</p>
        </div>
        
        <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Ini adalah form demo!');">
            <div class="form-group">
                <label for="email">Alamat Email</label>
                <input type="email" id="email" class="form-input" placeholder="contoh@email.com" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" class="form-input" placeholder="Masukkan kata sandi Anda" required autocomplete="current-password">
            </div>
            
            <a href="#" class="forgot-password">Lupa Kata Sandi?</a>
            
            <button type="submit" class="btn-submit">Masuk Sekarang</button>
        </form>

        <div class="divider">atau</div>
        
        <div class="register-link">
            Belum punya akun? <a href="#">Daftar di sini</a>
        </div>
    </div>
</body>
</html>
